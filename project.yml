name: ReadAloud
options:
  bundleIdPrefix: com.rubyhung
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

targets:
  ReadAloud:
    type: application
    platform: iOS
    sources:
      - path: ReadAloud
        excludes:
          - Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ReadAloud/Info.plist
        INFOPLIST_KEY_NSCameraUsageDescription: ReadAloud uses the camera to photograph book pages so it can read the text aloud.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: ReadAloud records your voice during shadowing practice so you can compare it with the original audio.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"

  ReadAloudTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReadAloudTests
    dependencies:
      - target: ReadAloud
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ReadAloud:
    build:
      targets:
        ReadAloud: all
    test:
      targets:
        - ReadAloudTests
