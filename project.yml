name: ReadAloud
options:
  bundleIdPrefix: com.rubyhung
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

targets:
  ReadAloud:
    type: application
    platform: iOS
    sources:
      - path: ReadAloud
        excludes:
          - Info.plist
    entitlements:
      path: ReadAloud/ReadAloud.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rubyhung.ReadAloud
    dependencies:
      - target: ReadAloudWidget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: ReadAloud/Info.plist
        INFOPLIST_KEY_NSCameraUsageDescription: ReadAloud uses the camera to photograph book pages so it can read the text aloud.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: ReadAloud records audio — your voice during shadowing, and conversations or clips you capture — so it can transcribe and play them back for learning.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: ReadAloud transcribes the audio you capture entirely on your device so you can read and study it. Nothing is sent anywhere.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"

  ReadAloudWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ReadAloudWidget
      - path: ReadAloud/Services/SharedStore.swift
    entitlements:
      path: ReadAloudWidget/ReadAloudWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rubyhung.ReadAloud
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ReadAloudWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rubyhung.ReadAloud.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  ReadAloudTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReadAloudTests
    dependencies:
      - target: ReadAloud
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ReadAloud:
    build:
      targets:
        ReadAloud: all
    test:
      targets:
        - ReadAloudTests
